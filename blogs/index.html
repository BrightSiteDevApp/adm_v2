    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Blog",
      "name": "AFIT Digital Market Campus News",

      "publisher": {
        "@type": "Organization",

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="icon" href="../asset/img/app-logo.png" type="image/png" sizes="192x192">

    <style>
        :root {
            --brand-color: #2d8eff; /* AFIT Blue */
        }
        .header-top-flex { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .page-title { font-size: 20px; font-weight: 800; color: var(--text-main); margin: 0; }
        
        .search-container { background: white; border-radius: 12px; display: flex; align-items: center; padding: 14px 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); margin-bottom: 15px;}
        .search-container input { border: none; background: transparent; outline: none; width: 100%; font-size: 14px; color: var(--text-main); }
        
        /* Category Chips */
        .chip-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .chip-scroll::-webkit-scrollbar { display: none; }
        .chip { padding: 8px 16px; background: white; border: 1px solid #e2e8f0; border-radius: 20px; font-size: 12px; font-weight: 600; color: var(--text-muted); white-space: nowrap; cursor: pointer; transition: 0.2s; }
        .chip.active { background: var(--brand-color); color: white; border-color: var(--brand-color); }

        /* Cool Horizontal News Card Layout */
        .news-card { 
            background: white; border-radius: 16px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); 
            border: 1px solid #f1f5f9; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; 
            display: flex; gap: 15px; padding: 12px; align-items: center;
        }
        .news-card:active { transform: scale(0.98); }
        
        .news-cover { 
            width: 95px; height: 95px; border-radius: 12px; object-fit: cover; 
            background: #f8fafc; flex-shrink: 0; border: 1px solid #f1f5f9;
        }
        
        .news-content { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
        
        .blog-meta { display: flex; justify-content: space-between; align-items: center; font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; }
        .cat-badge { color: var(--brand-color); background: rgba(45, 142, 255, 0.1); padding: 4px 8px; border-radius: 6px; letter-spacing: 0.5px;}
        
        .blog-title { font-size: 15px; font-weight: 800; color: var(--text-main); margin-bottom: 4px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .blog-snippet { font-size: 12px; color: var(--text-muted); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 8px;}
        
        /* Interaction Row */
        .interaction-row { display: flex; justify-content: space-between; align-items: center; }
        .stats-group { display: flex; gap: 12px; }
        .stat-item { display: flex; align-items: center; gap: 4px; color: #94a3b8; font-size: 11px; font-weight: 700; }
        .stat-item i { font-size: 12px; transition: 0.2s; }
        .liked { color: #ef4444 !important; }
        
        .share-btn { 
            color: var(--text-muted); background: #f1f5f9; width: 28px; height: 28px; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 12px; transition: 0.2s;
        }
        .share-btn:active { transform: scale(0.9); background: #e2e8f0; }

        /* 🚀 SKELETON LOADER STYLES */
        .sk-shimmer { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .sk-news-cover { width: 95px; height: 95px; border-radius: 12px; flex-shrink: 0; }

        /* ========================================= */
        /* 🌙 DARK MODE FIXES FOR CAMPUS NEWS        */
        /* ========================================= */
        body.dark-mode { background-color: #020617 !important; }
        body.dark-mode .app-container { background: #0f172a !important; }
        body.dark-mode .page-title, body.dark-mode .back-btn { color: #f1f5f9 !important; }
        body.dark-mode .search-container { background: #1e293b !important; border: 1px solid #334155 !important; box-shadow: none !important; }
        body.dark-mode .search-container input { color: #f1f5f9 !important; }
        body.dark-mode .chip { background: #1e293b !important; border-color: #334155 !important; color: #94a3b8 !important; }
        body.dark-mode .chip.active { background: var(--brand-color) !important; color: white !important; border-color: var(--brand-color) !important; }
        
        body.dark-mode .news-card { background: #1e293b !important; border-color: #334155 !important; }
        body.dark-mode .news-cover { border-color: #334155 !important; background: #0f172a !important;}
        body.dark-mode .blog-title { color: #f1f5f9 !important; }
        body.dark-mode .blog-snippet { color: #cbd5e1 !important; }
        body.dark-mode .cat-badge { background: rgba(45, 142, 255, 0.15) !important; }
        body.dark-mode .share-btn { background: #334155 !important; color: #cbd5e1 !important; }
        body.dark-mode .share-btn:active { background: #475569 !important; }
        
        body.dark-mode .sk-shimmer { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%) !important; background-size: 200% 100% !important; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="header" style="background: transparent; border: none; padding-bottom: 5px;">
            <div class="header-top-flex">
                <a href="../index.html" class="back-btn" style="color: var(--text-main); font-size: 20px;"><i class="fas fa-arrow-left"></i></a>
                <h1 class="page-title">Campus News</h1>
            </div>
            <div class="search-container">
                <i class="fas fa-search" style="color: #94a3b8; margin-right: 10px;"></i>
                <input type="text" id="blog-search" placeholder="Search gossips, news..." oninput="filterBlogs()">
            </div>
        </div>

        <div class="content-area" style="padding: 0 20px 90px;">
            
            <div class="chip-scroll">
                <div class="chip active" onclick="setCategory('All', this)">All News</div>
                <div class="chip" onclick="setCategory('News', this)">News</div>
                <div class="chip" onclick="setCategory('Academics', this)">Academics</div>
                <div class="chip" onclick="setCategory('Gossip', this)">Gossip</div>
                <div class="chip" onclick="setCategory('Events', this)">Events</div>
            </div>

            <div id="blog-list" style="margin-top: 20px;">
                
                <div class="news-card" style="cursor: default;">
                    <div class="sk-shimmer sk-news-cover"></div>
                    <div class="news-content" style="padding: 0;">
                        <div style="display:flex; justify-content:space-between; margin-bottom: 8px;">
                            <div class="sk-shimmer" style="width: 45px; height: 16px;"></div>
                            <div class="sk-shimmer" style="width: 60px; height: 12px;"></div>
                        </div>
                        <div class="sk-shimmer" style="width: 100%; height: 16px; margin-bottom: 6px;"></div>
                        <div class="sk-shimmer" style="width: 75%; height: 16px; margin-bottom: 12px;"></div>
                        <div class="sk-shimmer" style="width: 100%; height: 12px; margin-bottom: 15px;"></div>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div class="sk-shimmer" style="width: 110px; height: 14px;"></div>
                            <div class="sk-shimmer" style="width: 28px; height: 28px; border-radius: 50%;"></div>
                        </div>
                    </div>
                </div>

                <div class="news-card" style="cursor: default;">
                    <div class="sk-shimmer sk-news-cover"></div>
                    <div class="news-content" style="padding: 0;">
                        <div style="display:flex; justify-content:space-between; margin-bottom: 8px;">
                            <div class="sk-shimmer" style="width: 55px; height: 16px;"></div>
                            <div class="sk-shimmer" style="width: 50px; height: 12px;"></div>
                        </div>
                        <div class="sk-shimmer" style="width: 90%; height: 16px; margin-bottom: 6px;"></div>
                        <div class="sk-shimmer" style="width: 60%; height: 16px; margin-bottom: 12px;"></div>
                        <div class="sk-shimmer" style="width: 95%; height: 12px; margin-bottom: 15px;"></div>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div class="sk-shimmer" style="width: 90px; height: 14px;"></div>
                            <div class="sk-shimmer" style="width: 28px; height: 28px; border-radius: 50%;"></div>
                        </div>
                    </div>
                </div>

                <div class="news-card" style="cursor: default;">
                    <div class="sk-shimmer sk-news-cover"></div>
                    <div class="news-content" style="padding: 0;">
                        <div style="display:flex; justify-content:space-between; margin-bottom: 8px;">
                            <div class="sk-shimmer" style="width: 40px; height: 16px;"></div>
                            <div class="sk-shimmer" style="width: 65px; height: 12px;"></div>
                        </div>
                        <div class="sk-shimmer" style="width: 100%; height: 16px; margin-bottom: 6px;"></div>
                        <div class="sk-shimmer" style="width: 85%; height: 16px; margin-bottom: 12px;"></div>
                        <div class="sk-shimmer" style="width: 80%; height: 12px; margin-bottom: 15px;"></div>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div class="sk-shimmer" style="width: 120px; height: 14px;"></div>
                            <div class="sk-shimmer" style="width: 28px; height: 28px; border-radius: 50%;"></div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <div class="bottom-nav">
            <a href="../index.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
            <a href="#" class="nav-item" onclick="requireLogin('../messages/index.html')">
                <i class="fas fa-comment-dots"></i><span class="red-dot msg-dot"></span><span>Messages</span>
            </a>
            <div class="nav-fab" onclick="requireLogin('../add-product/index.html')"><i class="fas fa-plus"></i></div>
            <a href="#" class="nav-item" onclick="requireLogin('../saved/index.html')"><i class="fas fa-heart"></i><span>Saved</span></a>
            <a href="#" class="nav-item" onclick="requireLogin('../account/index.html')"><i class="fas fa-user"></i><span>Account</span></a>
        </div>

    </div>

    <script src="../asset/script.js"></script>

    <script>
    let currentUser = null;
    let allBlogs = [];
    let activeCategory = 'All';

    document.addEventListener("DOMContentLoaded", async () => {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) currentUser = session.user;
        fetchBlogs();
    });

    async function requireLogin(targetUrl) {
        if (currentUser) window.location.href = targetUrl;
        else window.location.href = "../login/index.html";
    }

    function createSlug(title) {
        return title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');
    }

    async function fetchBlogs() {
        try {
            const { data, error } = await supabaseClient
                .from('blogs')
                .select('id, title, snippet, category, image_url, views, likes, created_at, blog_comments(count)')
                .order('created_at', { ascending: false });

            if (error) throw error;
            allBlogs = data;
            renderBlogs();

        } catch (error) {
            console.error(error);
            document.getElementById('blog-list').innerHTML = `<p style="color:red; text-align:center;">Failed to load news.</p>`;
        }
    }

    function renderBlogs() {
        const container = document.getElementById('blog-list');
        const query = document.getElementById('blog-search').value.toLowerCase();
        
        container.innerHTML = "";

        const filtered = allBlogs.filter(b => {
            const matchesSearch = b.title.toLowerCase().includes(query) || (b.snippet && b.snippet.toLowerCase().includes(query));
            const matchesCat = activeCategory === 'All' || b.category === activeCategory;
            return matchesSearch && matchesCat;
        });

        if (filtered.length === 0) {
            container.innerHTML = `
                <div style="text-align:center; padding: 40px 20px;">
                    <i class="fas fa-newspaper" style="font-size:40px; color:#cbd5e1; margin-bottom:15px;"></i>
                    <h3 style="color:var(--text-main); margin:0 0 5px; font-size: 16px;">No news found</h3>
                    <p style="color:var(--text-muted); font-size:13px;">Try selecting a different category or adjusting your search.</p>
                </div>
            `;
            return;
        }

        filtered.forEach(b => {
            const isLiked = currentUser && b.likes && b.likes.includes(currentUser.id);
            const likeClass = isLiked ? 'fas fa-heart liked' : 'far fa-heart';
            const likeCount = b.likes ? b.likes.length : 0;
            const commentCount = (b.blog_comments && b.blog_comments.length > 0) ? b.blog_comments[0].count : 0;
            
            const safeTitle = b.title.replace(/'/g, "\\'").replace(/"/g, '&quot;');
            const safeSnippet = b.snippet ? b.snippet.replace(/'/g, "\\'").replace(/"/g, '&quot;') : '';
            const slug = createSlug(b.title);
            
            const dateObj = new Date(b.created_at);
            const shortDate = `${dateObj.toLocaleString('en-US', { month: 'short' })} ${dateObj.getDate()}`;

            // 🚀 XSS FIX: Escape title, snippet, and category
            container.innerHTML += `
                <div class="news-card" onclick="window.location.href='../blog-content/index.html?post=${slug}--${b.id}'">
                    <img src="${b.image_url || 'https://via.placeholder.com/100'}" class="news-cover" onerror="this.src='https://via.placeholder.com/100'">
                    <div class="news-content">
                        <div class="blog-meta">
                            <span class="cat-badge">${escapeHTML(b.category || 'News')}</span>
                            <span class="blog-date">${shortDate}</span>
                        </div>
                        <h3 class="blog-title">${escapeHTML(b.title)}</h3>
                        <div class="blog-snippet">${escapeHTML(b.snippet || '')}</div>
                        
                        <div class="interaction-row">
                            <div class="stats-group">
                                <div class="stat-item" onclick="event.stopPropagation(); toggleLike('${b.id}')">
                                    <i class="${likeClass}"></i> ${likeCount}
                                </div>
                                <div class="stat-item"><i class="far fa-comment"></i> ${commentCount}</div>
                                <div class="stat-item"><i class="far fa-eye"></i> ${b.views || 0}</div>
                            </div>
                            <div class="share-btn" onclick="event.stopPropagation(); shareBlog('${b.id}', '${safeTitle}', '${safeSnippet}')"><i class="fas fa-share-alt"></i></div>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    window.setCategory = function(cat, btn) {
        activeCategory = cat;
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        renderBlogs();
    }

    window.filterBlogs = function() { renderBlogs(); }

    window.toggleLike = async function(blogId) {
        if (!currentUser) {
            alert("Please log in to like posts.");
            window.location.href = "../login/index.html";
            return;
        }

        const b = allBlogs.find(x => x.id === blogId);
        let currentLikes = b.likes || [];
        
        if (currentLikes.includes(currentUser.id)) currentLikes = currentLikes.filter(id => id !== currentUser.id);
        else currentLikes.push(currentUser.id);

        b.likes = currentLikes; renderBlogs();
        try { await supabaseClient.from('blogs').update({ likes: currentLikes }).eq('id', blogId); } 
        catch (error) { console.error("Like failed to sync."); }
    }

    window.shareBlog = function(blogId, title, snippet) {
        const slug = createSlug(title);
        const url = `${window.location.origin}/blog-content/index.html?post=${slug}--${blogId}`;
        
        const shareText = `*${title}*\n\n${snippet}\n\nRead the full article on AFIT Digital Market:\n${url}`;

        if (navigator.share) {
            navigator.share({
                title: "AFIT Campus News",
                text: `*${title}*\n${snippet}\n\nRead the full article on AFIT Digital Market:`,
                url: url
            }).catch(err => console.log('Share cancelled', err));
        } else {
            const waUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(shareText)}`;
            window.open(waUrl, '_blank');
        }
    }
</script>
</body>
