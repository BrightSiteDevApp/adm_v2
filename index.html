<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AFIT Digital Market | Home</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="asset/style.css">
</head>
<body>

    <div class="app-container">
        
        <div class="header">
            <div class="header-top">
               <a href="index.html" class="logo-link">
                    <img src="asset/img/logo.png" alt="AFIT Digital Market Logo" class="header-logo" onerror="this.src='https://via.placeholder.com/150x45?text=AFIT+DGM'">
                </a>
                <a href="notification/" class="notify-icon-container" id="bell-icon" style="position: relative;">
                    <i class="far fa-bell"></i>
                    <span class="red-dot notify-dot" id="red-dot" style="display:none; position:absolute; top:-2px; right:-2px; width:10px; height:10px; background:#ef4444; border-radius:50%; border:2px solid white;"></span>
                </a>
            </div>
            <div class="search-box">
                <i class="fas fa-search search-icon" id="search-btn-icon"></i>
                <input type="text" id="main-search" placeholder="Search for items, vendors, services on campus...">
            </div>
        </div>

        <div class="content-area">
            
           <div class="category-grid">
    <a href="requests/" class="cat-item">
        <div class="cat-icon-box" style="color: #f43f5e; background: #fff1f2;"><i class="fas fa-bullhorn"></i></div>
        <span class="cat-name">Request</span>
    </a>

    <a href="items/index.html?cat=Gadgets" class="cat-item">
        <div class="cat-icon-box" style="color: #3b82f6; background: #eff6ff;"><i class="fas fa-mobile-screen"></i></div>
        <span class="cat-name">Gadgets</span>
    </a>
    
    <a href="items/index.html?cat=Fashion" class="cat-item">
        <div class="cat-icon-box" style="color: #ec4899; background: #fdf2f8;"><i class="fas fa-bag-shopping"></i></div>
        <span class="cat-name">Fashion</span>
    </a>
    
    <a href="items/index.html?cat=Food" class="cat-item">
        <div class="cat-icon-box" style="color: #f59e0b; background: #fffbeb;"><i class="fas fa-bowl-food"></i></div>
        <span class="cat-name">Food</span>
    </a>
    
    <a href="items/index.html?cat=Transport" class="cat-item">
        <div class="cat-icon-box" style="color: #eab308; background: #fefce8;"><i class="fas fa-truck-fast"></i></div>
        <span class="cat-name">Transport</span>
    </a>
    
    <a href="items/index.html?cat=Beauty" class="cat-item">
        <div class="cat-icon-box" style="color: #f43f5e; background: #fff1f2;"><i class="fas fa-spa"></i></div>
        <span class="cat-name">Beauty</span>
    </a>
    
    <a href="items/index.html?cat=CampusServices" class="cat-item">
        <div class="cat-icon-box" style="color: #10b981; background: #ecfdf5;"><i class="fas fa-copy"></i></div>
        <span class="cat-name">Services</span>
    </a>
    
    <a href="category/" class="cat-item">
        <div class="cat-icon-box" style="color: #64748b; background: #f8fafc;"><i class="fas fa-ellipsis-h"></i></div>
        <span class="cat-name">Others</span>
    </a>
</div>

            <div class="section-wrapper">
                <div class="section-header">
                    <div class="section-title">Student Reviews</div>
                    <a href="reviews/index.html" class="see-all">See all</a>
                </div>
               <div class="reviews-slider" id="reviews-slider">
                    <div class="review-card">
                        <div class="rev-header">
                            <div class="sk-shimmer sk-avatar"></div>
                            <div style="flex: 1;">
                                <div class="sk-shimmer sk-line short"></div>
                                <div class="sk-shimmer sk-line medium" style="height: 8px;"></div>
                            </div>
                        </div>
                        <div class="sk-shimmer sk-line long"></div>
                        <div class="sk-shimmer sk-line medium"></div>
                    </div>
                </div>
            </div>

            <div class="section-wrapper">
                <div class="section-header">
                    <div class="section-title">Available Items</div>
                    <a href="items/index.html" class="see-all">See all</a>
                </div>
                <div class="product-grid" id="product-grid">
                    <div class="sk-card">
                        <div class="sk-shimmer sk-img"></div>
                        <div class="sk-shimmer sk-line short"></div>
                        <div class="sk-shimmer sk-line long"></div>
                        <div class="sk-shimmer sk-line medium"></div>
                    </div>
                    <div class="sk-card">
                        <div class="sk-shimmer sk-img"></div>
                        <div class="sk-shimmer sk-line short"></div>
                        <div class="sk-shimmer sk-line long"></div>
                        <div class="sk-shimmer sk-line medium"></div>
                    </div>
                </div>
            </div>

            <div class="section-wrapper">
                <div class="section-header">
                    <div class="section-title">Verified Vendors</div>
                    <a href="vendors/index.html" class="see-all">See all</a>
                </div>
               <div class="product-grid" id="vendor-grid">
                    <div class="sk-card" style="align-items: center;">
                        <div class="sk-shimmer sk-v-avatar"></div>
                        <div class="sk-shimmer sk-line medium"></div>
                        <div class="sk-shimmer sk-line short"></div>
                    </div>
                    <div class="sk-card" style="align-items: center;">
                        <div class="sk-shimmer sk-v-avatar"></div>
                        <div class="sk-shimmer sk-line medium"></div>
                        <div class="sk-shimmer sk-line short"></div>
                    </div>
                </div>
            </div>

            <div class="section-wrapper" style="margin-top: 10px;">
                <div class="section-header">
                    <div class="section-title">Campus Gist & News</div>
                    <a href="blogs/index.html" class="see-all">See all</a>
                </div>
               <div id="blog-list">
                    <div class="blog-card">
                        <div class="sk-shimmer sk-b-img"></div>
                        <div style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
                            <div class="sk-shimmer sk-line short" style="margin-bottom: 10px;"></div>
                            <div class="sk-shimmer sk-line long"></div>
                            <div class="sk-shimmer sk-line medium"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="footer collapsed" id="main-app-footer">
                <div class="footer-toggle" id="footer-expand-btn">
                    <i class="fas fa-chevron-down" id="footer-arrow-icon"></i>
                </div>

                <div class="footer-top-collapsed">
                    <a href="index.html" class="logo-link">
                    <img src="asset/img/logo.png" alt="AFIT Digital Market Logo" class="header-logo" onerror="this.src='https://via.placeholder.com/150x45?text=AFIT+DGM'">
                </a>
                    <button class="download-app-btn" onclick="downloadApp()">Download App</button>
                </div>

                <div class="footer-expanded-links">
                    <div class="footer-links-grid">
                        <a href="about/index.html">About</a>
                        <a href="faq/index.html">FAQ</a>
                        <a href="terms/index.html">T&C</a>
                        <a href="contact/index.html">Contact</a>
                    </div>
                    <p class="copyright-text">
                        &copy; 2026 AFIT Digital Market<br>
                    </p>
                </div>
            </div>

        </div>

        <div class="bottom-nav">
            <a href="index.html" class="nav-item active">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="#" class="nav-item" onclick="requireLogin('messages/index.html')">
                <i class="fas fa-comment-dots"></i>
                <span class="red-dot msg-dot"></span>
                <span>Messages</span>
            </a>
            <div class="nav-fab" onclick="requireLogin('add-product/index.html')">
                <i class="fas fa-plus"></i>
            </div>
            <a href="#" class="nav-item" onclick="requireLogin('saved/index.html')">
                <i class="fas fa-heart"></i>
                <span>Saved</span>
            </a>
            <a href="#" class="nav-item" onclick="requireLogin('account/index.html')">
                <i class="fas fa-user"></i>
                <span>Account</span>
            </a>
        </div>

    </div>

    <script src="asset/script.js"></script>
</body>
</html>
