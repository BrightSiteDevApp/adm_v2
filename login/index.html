<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AFIT Digital Market | Authentication</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        * { box-sizing: border-box; }

        :root {
            --brand-color: #2d8eff; /* AFIT DGM Blue */
            --brand-bg: #ffffff; /* Clean white background */
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #e0e0e0; 
            margin: 0; padding: 0; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            color: var(--text-main);
        }

        .app-container {
            background: var(--brand-bg);
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            box-shadow: 0 0 30px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; justify-content: center;
            padding: 20px; position: relative;
        }

        .auth-card {
            background: white; width: 100%; padding: 40px 30px;
            border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.04);
            border: 1px solid #f1f5f9;
        }

        .back-link { display: inline-block; color: var(--text-muted); text-decoration: none; font-size: 14px; margin-bottom: 20px; font-weight: 600; }
        .auth-title { text-align: center; font-size: 24px; font-weight: 800; margin: 0 0 5px; }
        .auth-subtitle { text-align: center; font-size: 14px; color: var(--text-muted); margin: 0 0 25px; }

        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
        .form-input {
            width: 100%; padding: 12px 14px; border: 2px solid #e2e8f0;
            border-radius: 10px; font-size: 14px; font-family: 'Inter', sans-serif;
            outline: none; transition: 0.2s; background: #fff;
        }
        .form-input:focus { border-color: var(--brand-color); }

        .auth-btn {
            width: 100%; background: var(--brand-color); color: white; border: none;
            padding: 15px; border-radius: 12px; font-size: 16px; font-weight: 800;
            cursor: pointer; margin-top: 10px; transition: 0.2s;
        }
        .auth-btn:active { transform: scale(0.98); }
        .auth-btn:disabled { opacity: 0.7; cursor: not-allowed; }

        .auth-switch { text-align: center; margin-top: 25px; font-size: 14px; color: var(--text-muted); }
        .auth-switch span { color: var(--brand-color); font-weight: 600; cursor: pointer; text-decoration: underline; }

        .forgot-password { display: block; text-align: right; font-size: 12px; color: var(--brand-color); font-weight: 600; cursor: pointer; margin-top: -10px; margin-bottom: 15px; }

        .message-box { padding: 12px; border-radius: 8px; font-size: 13px; text-align: center; margin-bottom: 20px; display: none; }
        .error-msg { color: #ef4444; background: #fef2f2; border: 1px solid #fca5a5; }
        .success-msg { color: #059669; background: #d1fae5; border: 1px solid #6ee7b7; }

        .signup-only { display: none; }

        /* ========================================= */
        /* 🌙 DARK MODE FIXES                        */
        /* ========================================= */
        body.dark-mode { background-color: #020617 !important; }
        body.dark-mode .app-container { background: #0f172a !important; }
        
        body.dark-mode .auth-card { 
            background: #1e293b !important; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.5) !important; 
            border-color: #334155 !important;
        }
        
        body.dark-mode .auth-title { color: #f1f5f9 !important; }
        body.dark-mode .auth-subtitle { color: #94a3b8 !important; }
        body.dark-mode .back-link { color: #cbd5e1 !important; }
        
        body.dark-mode .form-label { color: #cbd5e1 !important; }
        body.dark-mode .form-input { 
            background: #0f172a !important; 
            color: #f1f5f9 !important; 
            border-color: #334155 !important; 
        }
        body.dark-mode .form-input:focus { border-color: var(--brand-color) !important; }
        
        body.dark-mode .auth-switch { color: #94a3b8 !important; }
        
        body.dark-mode .error-msg { background: rgba(239, 68, 68, 0.1) !important; border-color: #ef4444 !important; color: #fca5a5 !important; }
        body.dark-mode .success-msg { background: rgba(16, 185, 129, 0.1) !important; border-color: #10b981 !important; color: #6ee7b7 !important; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="auth-card">
            <a href="../" class="back-link">← Back to Market</a>
            
            <h1 class="auth-title" id="page-title">Welcome Back</h1>
            <p class="auth-subtitle" id="page-subtitle">Sign in to your student account</p>

            <div class="message-box" id="msg-box"></div>

            <form id="auth-form" onsubmit="processAuth(event)">
                
                <div class="form-group signup-only">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="name" class="form-input" placeholder="e.g. John Doe">
                </div>

                <div class="form-group signup-only">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" id="phone" class="form-input" placeholder="e.g. 08012345678">
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address *</label>
                    <input type="email" id="email" class="form-input" placeholder="student@afit.edu.ng" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password *</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>

                <span class="forgot-password" id="forgot-btn" onclick="recoverPassword()">Forgot Password?</span>

                <button type="submit" class="auth-btn" id="submit-btn">Sign In</button>
            </form>

            <div class="auth-switch" id="switch-text">
                Don't have an account? <span onclick="switchView()">Create one</span>
            </div>
        </div>
    </div>

    <script src="../asset/script.js"></script>

    <script>
        let isSignUpMode = false;

        function displayMessage(text, isError) {
            const msgBox = document.getElementById('msg-box');
            msgBox.innerText = text;
            msgBox.className = isError ? 'message-box error-msg' : 'message-box success-msg';
            msgBox.style.display = 'block';
        }

        function getSmartRedirectUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('redirect')) {
                return urlParams.get('redirect');
            }

            const referrer = document.referrer;
            const currentWebsite = window.location.origin;

            if (referrer && referrer.startsWith(currentWebsite) && !referrer.includes('/login/') && !referrer.includes('/reset-password/')) {
                return referrer; 
            }

            return "../";
        }

        window.switchView = function() {
            isSignUpMode = !isSignUpMode;
            document.getElementById('msg-box').style.display = 'none';

            const signupFields = document.querySelectorAll('.signup-only');

            if (isSignUpMode) {
                document.getElementById('page-title').innerText = "Create Account";
                document.getElementById('page-subtitle').innerText = "Join AFIT Digital Market";
                document.getElementById('submit-btn').innerText = "Sign Up";
                document.getElementById('forgot-btn').style.display = "none";
                document.getElementById('switch-text').innerHTML = `Already have an account? <span onclick="switchView()">Sign In</span>`;
                
                signupFields.forEach(f => f.style.display = "block");
                document.getElementById('name').required = true;
                document.getElementById('phone').required = true;
            } else {
                document.getElementById('page-title').innerText = "Welcome Back";
                document.getElementById('page-subtitle').innerText = "Sign in to your student account";
                document.getElementById('submit-btn').innerText = "Sign In";
                document.getElementById('forgot-btn').style.display = "block";
                document.getElementById('switch-text').innerHTML = `Don't have an account? <span onclick="switchView()">Create one</span>`;
                
                signupFields.forEach(f => f.style.display = "none");
                document.getElementById('name').required = false;
                document.getElementById('phone').required = false;
            }
        };

        window.processAuth = async function(event) {
            event.preventDefault(); 
            
            const emailVal = document.getElementById('email').value.trim();
            const passwordVal = document.getElementById('password').value;
            const nameVal = document.getElementById('name').value.trim();
            const phoneVal = document.getElementById('phone').value.trim();
            const btn = document.getElementById('submit-btn');

            document.getElementById('msg-box').style.display = 'none';
            btn.disabled = true;
            btn.innerText = "Processing...";

            try {
                if (isSignUpMode) {
                    const { data, error } = await supabaseClient.auth.signUp({
                        email: emailVal,
                        password: passwordVal,
                        options: {
                            data: {
                                full_name: nameVal,
                                phone: phoneVal
                            }
                        }
                    });

                    if (error) throw error;
                    
                    displayMessage("Success! Redirecting...", false);
                    setTimeout(() => { window.location.href = getSmartRedirectUrl(); }, 1000);

                } else {
                    const { data, error } = await supabaseClient.auth.signInWithPassword({
                        email: emailVal,
                        password: passwordVal
                    });

                    if (error) throw error;
                    
                    window.location.href = getSmartRedirectUrl();
                }
            } catch (error) {
                console.error("Auth Error:", error);
                displayMessage(error.message, true);
            } finally {
                btn.disabled = false;
                btn.innerText = isSignUpMode ? "Sign Up" : "Sign In";
            }
        };

        window.recoverPassword = async function() {
            const emailVal = document.getElementById('email').value.trim();
            if (!emailVal) {
                displayMessage("Please type your email in the box first, then click Forgot Password.", true);
                return;
            }

            document.getElementById('msg-box').style.display = 'none';
            const btn = document.getElementById('submit-btn');
            btn.innerText = "Sending Link...";
            btn.disabled = true;

            try {
                const { error } = await supabaseClient.auth.resetPasswordForEmail(emailVal, {
                    redirectTo: window.location.origin + '/reset-password/'
                });

                if (error) throw error;
                displayMessage("Reset link sent! Please check your email inbox.", false);
            } catch (error) {
                displayMessage(error.message, true);
            } finally {
                btn.innerText = "Sign In";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
