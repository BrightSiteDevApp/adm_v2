<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Create New Password | AFIT Digital Market</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../asset/style.css">

    <style>
        body { 
            background: #e0e0e0; display: flex; justify-content: center; min-height: 100vh; margin: 0; 
        }
        
        .app-container {
            background: #f8fafc; width: 100%; max-width: 480px; min-height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.1); box-sizing: border-box;
        }

        .auth-card {
            background: white; width: 100%; padding: 40px 30px;
            border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.03); text-align: center;
            box-sizing: border-box; border: 1px solid #f1f5f9;
        }

        .auth-icon {
            width: 70px; height: 70px; background: #eff6ff; color: var(--brand-color);
            border-radius: 20px; display: flex; justify-content: center; align-items: center;
            font-size: 28px; margin: 0 auto 20px; border: 2px solid #dbeafe;
        }

        .auth-title { font-size: 22px; font-weight: 900; color: var(--text-main); margin-bottom: 10px; }
        .auth-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 30px; line-height: 1.5; font-weight: 600;}

        .input-group { position: relative; margin-bottom: 20px; text-align: left; }
        .input-label { display: block; font-size: 13px; font-weight: 800; color: var(--text-main); margin-bottom: 8px; }
        
        .input-field {
            width: 100%; padding: 15px 40px 15px 16px; border: 2px solid #e2e8f0;
            border-radius: 14px; font-size: 14px; outline: none; background: #f8fafc;
            transition: 0.2s; box-sizing: border-box; color: var(--text-main);
        }
        .input-field:focus { 
            border-color: var(--brand-color); 
            background: white; 
            box-shadow: 0 4px 15px rgba(45, 142, 255, 0.1); 
        }
        
        .toggle-password {
            position: absolute; right: 15px; top: 43px; color: #94a3b8;
            cursor: pointer; font-size: 15px; transition: 0.2s;
        }
        .toggle-password:active { transform: scale(0.9); }

        .auth-btn {
            background: linear-gradient(135deg, var(--brand-color), #1a73e8); color: white; border: none; width: 100%;
            padding: 16px; border-radius: 14px; font-size: 15px; font-weight: 800;
            cursor: pointer; transition: 0.2s; margin-top: 10px; box-shadow: 0 8px 20px rgba(45, 142, 255, 0.3);
        }
        .auth-btn:active { transform: scale(0.98); }
        .auth-btn:disabled { opacity: 0.7; cursor: not-allowed; }

        #msg-box { font-size: 13px; font-weight: 700; margin-top: 20px; display: none; padding: 12px; border-radius: 10px;}
        .msg-error { color: #ef4444; background: #fef2f2; border: 1px solid #fecaca; }
        .msg-success { color: #10b981; background: #ecfdf5; border: 1px solid #a7f3d0; }

        /* ========================================= */
        /* 🌙 DARK MODE FIXES FOR RESET PASSWORD     */
        /* ========================================= */
        body.dark-mode { background-color: #020617 !important; }
        body.dark-mode .app-container { background: #0f172a !important; }
        
        body.dark-mode .auth-card { background: #1e293b !important; border-color: #334155 !important; box-shadow: 0 10px 40px rgba(0,0,0,0.5) !important; }
        
        body.dark-mode .auth-icon { background: #0f172a !important; color: var(--brand-color) !important; border-color: #334155 !important; }
        
        body.dark-mode .auth-title { color: #f1f5f9 !important; }
        body.dark-mode .auth-sub { color: #94a3b8 !important; }
        
        body.dark-mode .input-label { color: #cbd5e1 !important; }
        body.dark-mode .input-field { background: #0f172a !important; border-color: #334155 !important; color: #f1f5f9 !important; }
        body.dark-mode .input-field:focus { border-color: var(--brand-color) !important; }
        
        body.dark-mode .msg-error { background: rgba(239, 68, 68, 0.1) !important; border-color: #ef4444 !important; color: #fca5a5 !important; }
        body.dark-mode .msg-success { background: rgba(16, 185, 129, 0.1) !important; border-color: #10b981 !important; color: #6ee7b7 !important; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="auth-card">
            <div class="auth-icon"><i class="fas fa-key"></i></div>
            <h1 class="auth-title">Create New Password</h1>
            <p class="auth-sub">Make sure your new password is at least 6 characters long.</p>

            <div class="input-group">
                <label class="input-label">New Password</label>
                <input type="password" id="pass1" class="input-field" placeholder="Enter new password">
                <i class="fas fa-eye toggle-password" onclick="toggleVis('pass1', this)"></i>
            </div>

            <div class="input-group">
                <label class="input-label">Confirm Password</label>
                <input type="password" id="pass2" class="input-field" placeholder="Type it again">
                <i class="fas fa-eye toggle-password" onclick="toggleVis('pass2', this)"></i>
            </div>

            <button class="auth-btn" id="submit-btn" onclick="updatePassword()">Save New Password</button>
            
            <div id="msg-box"></div>
        </div>
    </div>

    <script src="../asset/script.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            supabaseClient.auth.onAuthStateChange((event, session) => {
                if (event === 'PASSWORD_RECOVERY') {
                    console.log("Recovery session active. Ready to update password.");
                }
            });
        });

        function toggleVis(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = "password";
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        async function updatePassword() {
            const p1 = document.getElementById('pass1').value;
            const p2 = document.getElementById('pass2').value;
            const msg = document.getElementById('msg-box');
            const btn = document.getElementById('submit-btn');

            msg.style.display = 'block';
            msg.className = 'msg-error'; 

            if (p1.length < 6) {
                msg.innerText = "Password must be at least 6 characters."; return;
            }
            if (p1 !== p2) {
                msg.innerText = "Passwords do not match."; return;
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';
            btn.disabled = true;

            try {
                const { data, error } = await supabaseClient.auth.updateUser({
                    password: p1
                });

                if (error) throw error;

                msg.className = 'msg-success';
                msg.innerHTML = "<i class='fas fa-check-circle'></i> Password updated successfully! Redirecting...";
                btn.innerText = "Success!";
                
                setTimeout(() => {
                    window.location.href = "../login/index.html";
                }, 2000);

            } catch (error) {
                msg.innerText = error.message || "Failed to update password. Your recovery link may have expired.";
                btn.innerText = "Save New Password";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
